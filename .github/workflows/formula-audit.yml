name: Formula Audit

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  audit:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@cf31444e770b9919bb21e695d66f56c39cfd3dee  # no-tags; pinned 2026-05-03

      - name: Audit formula syntax (strict)
        # brew audit --strict validates Ruby syntax, SPDX license, and formula structure
        # against the local file — no install or live tap required.
        # Non-zero exit with warnings only (no "Error:" lines) is acceptable.
        run: |
          if ! brew audit --strict Formula/nself.rb 2>&1; then
            if brew audit --strict Formula/nself.rb 2>&1 | grep -qiE '^Error:'; then
              echo "::error::brew audit found errors"
              exit 1
            fi
            echo "::warning::brew audit has warnings (acceptable)"
          fi

      - name: Verify formula SHA256 against release tarball
        # On release: download the tarball and confirm the SHA256 matches the formula.
        # On push to main: skip if there is no matching GitHub release tarball yet.
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORMULA_FILE=$(find . -name "nself.rb" | head -1)
          if [ -z "$FORMULA_FILE" ]; then
            echo "ERROR: nself.rb formula not found"
            exit 1
          fi

          TARBALL_URL=$(grep -E '^\s+url ' "$FORMULA_FILE" | sed 's/.*url "//' | sed 's/".*//' | tr -d '[:space:]')
          EXPECTED_SHA=$(grep -E '^\s+sha256 ' "$FORMULA_FILE" | sed 's/.*sha256 "//' | sed 's/".*//' | tr -d '[:space:]')

          if [ -z "$TARBALL_URL" ] || [ -z "$EXPECTED_SHA" ]; then
            echo "SKIP: Could not parse URL or SHA256 from formula"
            exit 0
          fi

          # Validate expected SHA is a 64-char lowercase hex string (sha256 format).
          # Catches truncation, accidental quotes, or copy-paste errors before download.
          if ! echo "$EXPECTED_SHA" | grep -qE '^[a-f0-9]{64}$'; then
            echo "::error::Formula SHA256 is malformed: '$EXPECTED_SHA'"
            echo "Expected format: 64 lowercase hex chars (sha256 digest)"
            exit 1
          fi

          echo "Downloading tarball: $TARBALL_URL"
          if ! curl -fsSL -o /tmp/nself-release.tar.gz "$TARBALL_URL"; then
            echo "::error::Failed to download tarball from $TARBALL_URL"
            echo "Verify the release tag exists and the URL is reachable."
            exit 1
          fi

          TARBALL_SIZE=$(wc -c < /tmp/nself-release.tar.gz | tr -d '[:space:]')
          ACTUAL_SHA=$(shasum -a 256 /tmp/nself-release.tar.gz | awk '{print $1}' | tr -d '[:space:]')

          echo "Tarball size:    ${TARBALL_SIZE} bytes"
          echo "Expected SHA256: $EXPECTED_SHA"
          echo "Actual SHA256:   $ACTUAL_SHA"

          if [ "$EXPECTED_SHA" = "$ACTUAL_SHA" ]; then
            echo "PASS: SHA256 matches"
          else
            echo "::error::Formula SHA256 does not match the released tarball."
            echo "Action required: update Formula/nself.rb sha256 field to: $ACTUAL_SHA"
            echo "Source URL:      $TARBALL_URL"
            exit 1
          fi
