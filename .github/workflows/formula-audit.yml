name: Formula Audit

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  audit:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Audit formula syntax (strict)
        # brew audit --strict validates Ruby syntax, SPDX license, and formula structure
        # against the local file — no install or live tap required.
        # Non-zero exit with warnings only (no "Error:" lines) is acceptable.
        run: |
          if ! brew audit --strict Formula/nself.rb 2>&1; then
            if brew audit --strict Formula/nself.rb 2>&1 | grep -qiE '^Error:'; then
              echo "::error::brew audit found errors"
              exit 1
            fi
            echo "::warning::brew audit has warnings (acceptable)"
          fi

      - name: Verify formula SHA256 against release tarball
        # On release: download the tarball and confirm the SHA256 matches the formula.
        # On push to main: skip if there is no matching GitHub release tarball yet.
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORMULA_FILE=$(find . -name "nself.rb" | head -1)
          if [ -z "$FORMULA_FILE" ]; then
            echo "ERROR: nself.rb formula not found"
            exit 1
          fi

          TARBALL_URL=$(grep -E '^\s+url ' "$FORMULA_FILE" | sed 's/.*url "//' | sed 's/".*//')
          EXPECTED_SHA=$(grep -E '^\s+sha256 ' "$FORMULA_FILE" | sed 's/.*sha256 "//' | sed 's/".*//')

          if [ -z "$TARBALL_URL" ] || [ -z "$EXPECTED_SHA" ]; then
            echo "SKIP: Could not parse URL or SHA256 from formula"
            exit 0
          fi

          echo "Downloading tarball: $TARBALL_URL"
          curl -fsSL -o /tmp/nself-release.tar.gz "$TARBALL_URL"

          ACTUAL_SHA=$(shasum -a 256 /tmp/nself-release.tar.gz | awk '{print $1}')

          echo "Expected SHA256: $EXPECTED_SHA"
          echo "Actual SHA256:   $ACTUAL_SHA"

          if [ "$EXPECTED_SHA" = "$ACTUAL_SHA" ]; then
            echo "PASS: SHA256 matches"
          else
            echo "FAIL: SHA256 mismatch"
            exit 1
          fi
