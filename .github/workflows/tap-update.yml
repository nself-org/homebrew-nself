name: Tap Auto-Update on CLI Release

# USER ACTION REQUIRED:
#   Set HOMEBREW_TAP_TOKEN in GitHub repo secrets for homebrew-nself
#   (github.com/nself-org/homebrew-nself/settings/secrets/actions):
#     HOMEBREW_TAP_TOKEN — GitHub Personal Access Token with `repo` scope on
#                          nself-org/homebrew-nself. This allows the workflow
#                          to push formula updates and open PRs against this tap.
#                          Create at https://github.com/settings/tokens (classic, repo scope).
#   Without HOMEBREW_TAP_TOKEN, this workflow skips the push/PR step gracefully (no-op success).
#
# Triggers on:
#   - repository_dispatch (type: cli-release) — sent by cli release.yml after publishing
#   - workflow_dispatch — manual update with explicit version + sha256 inputs
#
# This workflow is the canonical tap-update entry point. It is separate from
# update-formula.yml (which handles formula file edits) so that the tap-update
# trigger logic can be evolved independently.

on:
  repository_dispatch:
    types: [cli-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to update to (e.g. v1.1.1 or 1.1.1)'
        required: true
      sha256:
        description: 'SHA256 of the release tarball (leave blank to compute)'
        required: false

permissions:
  contents: read

jobs:
  tap-update:
    name: Update Homebrew tap formula
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Preflight (HOMEBREW_TAP_TOKEN present)
        id: preflight
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping tap push."
            echo "::notice::Set HOMEBREW_TAP_TOKEN (GitHub PAT with repo scope) in nself-org/homebrew-nself secrets."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.preflight.outputs.proceed == 'true'
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Resolve version and SHA256
        id: info
        if: steps.preflight.outputs.proceed == 'true'
        run: |
          # Prefer workflow_dispatch input, then repository_dispatch payload
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          SHA256="${{ github.event.inputs.sha256 || github.event.client_payload.sha256 }}"

          if [ -z "${VERSION}" ]; then
            echo "ERROR: version not provided via dispatch payload or workflow_dispatch input"
            exit 1
          fi

          # Normalize: ensure 'v' prefix
          case "$VERSION" in
            v*) : ;;
            *)  VERSION="v${VERSION}" ;;
          esac

          PLAIN_VERSION="${VERSION#v}"
          TARBALL_URL="https://github.com/nself-org/cli/archive/refs/tags/${VERSION}.tar.gz"

          if [ -z "${SHA256}" ]; then
            echo "Computing SHA256 for ${TARBALL_URL}..."
            SHA256=$(curl -fsSL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          fi

          echo "version=${VERSION}"               >> "$GITHUB_OUTPUT"
          echo "plain_version=${PLAIN_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "tarball_url=${TARBALL_URL}"       >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}"                 >> "$GITHUB_OUTPUT"

      - name: Update Formula/nself.rb
        if: steps.preflight.outputs.proceed == 'true'
        run: |
          PLAIN_VERSION="${{ steps.info.outputs.plain_version }}"
          TARBALL_URL="${{ steps.info.outputs.tarball_url }}"
          SHA256="${{ steps.info.outputs.sha256 }}"
          FORMULA="Formula/nself.rb"

          sed -i "s|url \"https://github.com/nself-org/cli/archive/refs/tags/.*\"|url \"${TARBALL_URL}\"|" "$FORMULA"
          sed -i "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|"                                            "$FORMULA"
          sed -i "s|version \"[0-9.]*\"|version \"${PLAIN_VERSION}\"|"                                    "$FORMULA"

          echo "Formula updated:"
          grep -E '^\s*(url|sha256|version)' "$FORMULA"

      - name: Verify formula syntax
        if: steps.preflight.outputs.proceed == 'true'
        run: ruby -c Formula/nself.rb

      - name: Commit and push
        if: steps.preflight.outputs.proceed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/nself.rb
          if git diff --cached --quiet; then
            echo "Formula already at ${{ steps.info.outputs.version }} — no update needed."
            exit 0
          fi
          git commit -m "formula: update nself to ${{ steps.info.outputs.version }}"
          git push origin main

      - name: Summary
        if: steps.preflight.outputs.proceed == 'true'
        run: |
          echo "### Homebrew tap updated" >> "$GITHUB_STEP_SUMMARY"
          echo "- Formula: \`Formula/nself.rb\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ steps.info.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA256: \`${{ steps.info.outputs.sha256 }}\`" >> "$GITHUB_STEP_SUMMARY"
