name: Test Formula

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test nself Homebrew Formula
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install bats
        run: brew install bats-core

      - name: Run static formula tests (file inspection only)
        # Static tier: file inspection only — no network, no install required.
        # Verifies formula has required fields (desc, homepage, url, sha256, install, test).
        run: bats --filter "static:" tests/test-formula.bats

      - name: Audit formula syntax
        # brew audit --strict checks Ruby syntax and SPDX license — no install required.
        # Non-zero exit with warnings-only (no "Error:" lines) is acceptable.
        run: |
          if ! brew audit --strict Formula/nself.rb 2>&1; then
            if brew audit --strict Formula/nself.rb 2>&1 | grep -qiE '^Error:'; then
              echo "::error::brew audit found errors"
              exit 1
            fi
            echo "::warning::brew audit has warnings (acceptable)"
          fi
